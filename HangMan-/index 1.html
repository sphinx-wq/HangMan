<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Hangman Game</h1>
            <div class="game-stats">
                <div class="wrong-guesses">
                    <span>Wrong guesses: </span>
                    <span class="wrong-count">0</span>
                    <span>/6</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            
            <div class="hangman-container">
                <svg class="hangman-svg" viewBox="0 0 200 250">
                    
                    <line x1="10" y1="230" x2="150" y2="230" stroke="#8B4513" stroke-width="4"/>
                    <line x1="30" y1="230" x2="30" y2="20" stroke="#8B4513" stroke-width="4"/>
                    <line x1="30" y1="20" x2="120" y2="20" stroke="#8B4513" stroke-width="4"/>
                    <line x1="120" y1="20" x2="120" y2="50" stroke="#8B4513" stroke-width="4"/>
                    
                    <circle class="hangman-part head" cx="120" cy="60" r="10" stroke="#333" stroke-width="3" fill="none"/>
                    <line class="hangman-part body" x1="120" y1="70" x2="120" y2="150" stroke="#333" stroke-width="3"/>
                    <line class="hangman-part left-arm" x1="120" y1="90" x2="90" y2="120" stroke="#333" stroke-width="3"/>
                    <line class="hangman-part right-arm" x1="120" y1="90" x2="150" y2="120" stroke="#333" stroke-width="3"/>
                    <line class="hangman-part left-leg" x1="120" y1="150" x2="90" y2="180" stroke="#333" stroke-width="3"/>
                    <line class="hangman-part right-leg" x1="120" y1="150" x2="150" y2="180" stroke="#333" stroke-width="3"/>
                </svg>
            </div>

            <!-- Word Display -->
            <div class="word-container">
                <div class="word-display"> 
                </div>
            </div>

            <!-- Alphabet Buttons -->
            <div class="alphabet-container">
            </div>
        </main>

        <!-- Game Status Messages -->
        <div class="game-status">
            <div class="status-message win-message">
                <h2>🎉 Congratulations!</h2>
                <p>You won the game!</p>
                <button class="control-btn new-game-btn" onclick="startNewGame()">New Game</button>
            </div>
            <div class="status-message lose-message">
                <h2>💀 Game Over!</h2>
                <p>Better luck next time!</p>
                <p>The word was: <span class="correct-word"></span></p>
                <button class="control-btn new-game-btn" onclick="startNewGame()">New Game</button>
            </div>
        </div>

        <!-- Game Controls -->
        <footer class="game-footer">
            <button class="control-btn new-game-btn">New Game</button>
        </footer>
    </div>
    <script src="words.en.js"></script>
    <script src="index.js"></script>
</body>
</html>
